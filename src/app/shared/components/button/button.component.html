<button
  [type]="typeBtn"
  [disabled]="disabled || loading"
  [ngClass]="colors"
  class="font-medium rounded text-sm px-5 py-2 focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-primary-500 transition-colors duration-150"
>
  @if (loading) {
    <span class="material-symbols-outlined mr-2 animate-spin">autorenew</span>
  }
  <ng-content></ng-content>
</button>
