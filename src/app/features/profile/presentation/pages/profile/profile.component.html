<div class="max-w-3xl mx-auto px-6 py-8">
  <!-- Page header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Profile</h1>
  </div>

  @if (profile(); as user) {
    <div data-testid="profile-card" class="bg-white rounded-2xl border border-[#EAEAEA] overflow-hidden">
      <!-- Cover band -->
      <div class="h-32 bg-gradient-to-br from-primary-200 to-primary-100"></div>

      <!-- Avatar + name -->
      <div class="px-8 -mt-12">
        <app-avatar
          data-testid="profile-avatar"
          [seed]="user"
          [alt]="user.name + ' avatar'"
          [size]="96"
        />
        <div class="mt-4">
          <h1 data-testid="profile-name" class="text-xl font-semibold text-gray-900">{{ user.name }}</h1>
          <p data-testid="profile-email" class="text-sm text-gray-500 mt-0.5">{{ user.email }}</p>
        </div>
      </div>

      <!-- Info section -->
      <div class="px-8 py-6 mt-4">
        <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4 border-t border-[#EAEAEA] pt-6">
          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Account</dt>
            <dd data-testid="profile-account-id" class="mt-1 text-sm text-gray-900 font-mono">#{{ user.id }}</dd>
          </div>
          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Member since</dt>
            <dd data-testid="profile-created" class="mt-1 text-sm text-gray-900">{{ formatDate(user.createdAt) }}</dd>
          </div>
        </dl>
      </div>
    </div>
  } @else {
    <div data-testid="profile-loading" class="bg-white rounded-2xl border border-[#EAEAEA] p-8">
      <div class="flex flex-col items-center">
        <app-skeleton variant="circle" width="6rem" height="6rem"></app-skeleton>
        <app-skeleton class="mt-4" variant="text" width="60%" height="1.5rem"></app-skeleton>
        <app-skeleton class="mt-2" variant="text" width="40%" height="1rem"></app-skeleton>
      </div>
    </div>
  }
</div>
