<h2 class="text-lg font-semibold text-gray-900 text-center mb-6">Set new password</h2>
<form [formGroup]="form" novalidate class="space-y-5" (ngSubmit)="recovery()">
  <div>
    <label for="recovery-password" class="block text-sm font-medium text-gray-700 mb-1.5">New password</label>
    <div class="relative">
      <input
        id="recovery-password"
        formControlName="newPassword"
        placeholder="Enter new password"
        [type]="showPassword ? 'text' : 'password'"
        class="w-full rounded-lg border border-[#EAEAEA] px-3.5 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition-all duration-150 focus:ring-2 focus:ring-primary-300 focus:border-transparent pr-10"
      />
      <button type="button" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-gray-600 transition-colors" (click)="showPassword = !showPassword">
        <span class="material-symbols-outlined text-[18px]">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
      </button>
    </div>
    <div *ngIf="form.controls.newPassword.touched && form.controls.newPassword.invalid">
      <p *ngIf="form.controls.newPassword.hasError('required')" class="text-red-500 text-xs mt-1">This field is required</p>
      <p *ngIf="form.controls.newPassword.hasError('minlength')" class="text-red-500 text-xs mt-1">Must be at least 6 characters</p>
    </div>
  </div>
  <div>
    <label for="recovery-confirm" class="block text-sm font-medium text-gray-700 mb-1.5">Confirm new password</label>
    <input
      id="recovery-confirm"
      formControlName="confirmPassword"
      placeholder="Confirm your new password"
      type="password"
      class="w-full rounded-lg border border-[#EAEAEA] px-3.5 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition-all duration-150 focus:ring-2 focus:ring-primary-300 focus:border-transparent"
    />
    <div *ngIf="form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid">
      <p *ngIf="form.controls.confirmPassword.hasError('required')" class="text-red-500 text-xs mt-1">This field is required</p>
    </div>
  </div>
  <div *ngIf="form.controls.confirmPassword.touched">
    <p *ngIf="form.hasError('mismatch')" class="text-red-500 text-xs mt-1">Passwords do not match</p>
  </div>
  @if (status === 'failed') {
    <div class="rounded-lg bg-danger-100 border border-danger-200 px-4 py-3">
      <p class="text-sm text-danger-800">{{ errorMessage }}</p>
    </div>
  }
  <button type="submit" [disabled]="status === 'loading'" class="w-full rounded-lg bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium px-4 py-2.5 transition-colors duration-150 disabled:opacity-50">
    @if (status === 'loading') {
      <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"></span>
    }
    Reset password
  </button>
</form>
