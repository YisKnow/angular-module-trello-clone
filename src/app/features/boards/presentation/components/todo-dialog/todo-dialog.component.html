<div class="p-6 bg-gray-100 relative rounded shadow">
  <button (click)="close()" type="button" class="absolute top-3 right-3 focus:outline-none p-2">
    <span class="material-symbols-outlined">close</span>
  </button>
  <div class="flex space-x-2 mb-5">
    <span class="material-symbols-outlined text-gray-800">task_alt</span>
    <div class="flex flex-col">
      <h3 class="text-lg font-semibold text-gray-800">{{ card.title }}</h3>
      <p class="text-sm text-gray-500">in list</p>
    </div>
  </div>
  <div class="flex w-full gap-4">
    <div class="flex space-x-2 mb-5 w-4/6">
      <span class="material-symbols-outlined text-gray-800">subject</span>
      <div class="flex flex-col w-full">
        <h3 class="text-lg font-semibold text-gray-800">Description</h3>
        @if (!editingDescription()) {
          <button
            type="button"
            data-testid="open-description-edit"
            class="text-left text-sm text-gray-700 bg-white hover:bg-gray-50 border border-[#EAEAEA] rounded-lg p-3 mt-1 min-h-[3rem] w-full transition-colors duration-150"
            (click)="startEditingDescription()"
          >
            @if (card.description) {
              {{ card.description }}
            } @else {
              <span class="text-gray-400">Add a description…</span>
            }
          </button>
        } @else {
          <textarea
            data-testid="description-textarea"
            [value]="descriptionDraft()"
            (input)="descriptionDraft.set(asInputValue($event))"
            class="text-sm text-gray-700 bg-white border border-[#EAEAEA] rounded-lg p-3 mt-1 w-full resize-none focus:ring-2 focus:ring-primary-300 focus:border-transparent transition-all duration-150"
            rows="4"
            placeholder="Add a description…"
          ></textarea>
          <div class="flex items-center gap-2 mt-2">
            <button
              type="button"
              data-testid="save-description"
              [disabled]="saving()"
              (click)="saveDescription()"
              class="rounded-lg bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium px-4 py-2 transition-colors duration-150 disabled:opacity-50"
            >
              @if (saving()) {
                <span
                  class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2 align-middle"
                ></span>
              }
              Save
            </button>
            <button
              type="button"
              data-testid="cancel-description"
              (click)="cancelEditingDescription()"
              class="rounded-lg text-gray-500 hover:text-gray-700 text-sm px-3 py-2 transition-colors duration-150"
            >
              Cancel
            </button>
          </div>
        }
      </div>
    </div>
    <div class="flex flex-auto space-y-2 flex-col">
      <p class="text-xs uppercase tracking-wide text-gray-400 font-medium">Card details</p>
      <p class="text-sm text-gray-500">
        More actions (labels, checklists, due dates) are not part of this build.
      </p>
    </div>
  </div>
</div>
