<div class="p-6 bg-gray-100 relative rounded shadow">
  <button (click)="close()" type="button" class="absolute top-3 right-3 focus:outline-none p-2">
    <span class="material-symbols-outlined">close</span>
  </button>
  <div class="flex space-x-2 mb-5">
    <span class="material-symbols-outlined text-gray-800">task_alt</span>
    <div class="flex flex-col">
      <h3 class="text-lg font-semibold text-gray-800">{{ card.title }}</h3>
      <p class="text-sm text-gray-500">in list ToDo</p>
    </div>
  </div>
  <div class="flex w-full gap-4">
    <div class="flex space-x-2 mb-5 w-4/6">
      <span class="material-symbols-outlined text-gray-800">subject</span>
      <div class="flex flex-col">
        <h3 class="text-lg font-semibold text-gray-800">Description</h3>
        <p class="text-sm text-gray-500">{{ card.description }}</p>
        <div class="flex space-x-2">
          <button type="button" (click)="closeWithRta(true)">Si</button>
          <button type="button" (click)="closeWithRta(false)">No</button>
        </div>
      </div>
    </div>
    <div class="flex flex-auto space-y-2 flex-col">
      <app-btn typeBtn="button" color="light">
        <span class="flex space-x-2 text-left">
          <span class="material-symbols-outlined text-gray-800">person</span>
          <span>Members</span>
        </span>
      </app-btn>
      <app-btn typeBtn="button" color="light">
        <span class="flex space-x-2 text-left">
          <span class="material-symbols-outlined text-gray-800">label</span>
          <span>Labels</span>
        </span>
      </app-btn>
      <app-btn typeBtn="button" color="light">
        <span class="flex space-x-2 text-left">
          <span class="material-symbols-outlined text-gray-800">checklist</span>
          <span>Checklist</span>
        </span>
      </app-btn>
      <app-btn typeBtn="button" color="light">
        <span class="flex space-x-2 text-left">
          <span class="material-symbols-outlined text-gray-800">schedule</span>
          <span>Dates</span>
        </span>
      </app-btn>
    </div>
  </div>
</div>
